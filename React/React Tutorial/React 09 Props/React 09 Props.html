<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
</head>
<body>

<div id="root2"></div>
<div id="root3"></div>
<div id="root4"></div>
<div id="root5"></div>

<script type="text/babel">
// React Props
    // Props are arguments passed into React components.
    // Props are passed to components via HTML attributes.
    // props stands for properties.

    // React Props are like function arguments in JavaScript and attributes in HTML.
    // To send props into a component, use the same syntax as HTML attributes:
    // Add a "brand" attribute to the Car element:
        function Car(props) {
            return <h2>I am a { props.brand }!</h2>;
        }
        const myElement = <Car brand="Ford" />;

    // The component receives the argument as a props object:
    // Use the brand attribute in the component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car2(props) {
            return <h2>I am a { props.brand }!</h2>;
        }
        const myElement2 = <Car2 brand="Ford" />;
        const root2 = ReactDOM.createRoot(document.getElementById('root2'));
        root2.render(myElement2);

// Pass Data
    // Props are also how you pass data from one component to another, as parameters.
    // Send the "brand" property from the Garage component to the Car component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car3(props) {
            return <h2>I am a { props.brand }!</h2>;
        }
        function Garage3() {
            return (
                <>
                    <h1>Who lives in my garage?</h1>
                    <Car3 brand="Ford" />
                </>
            );
        }
        const root3 = ReactDOM.createRoot(document.getElementById('root3'));
        root3.render(<Garage3 />);

    // If you have a variable to send, and not a string as in the example above,
    // you just put the variable name inside curly brackets:
    // Create a variable named carName and send it to the Car component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car4(props) {
            return <h2>Me, I am a { props.brand }!</h2>;
        }
        function Garage4() {
            const carName = "Ford";
            return (
                <>
                    <h1>Who lives in my garage again?</h1>
                    <Car4 brand={ carName } />
                </>
            );
        }
        const root4 = ReactDOM.createRoot(document.getElementById('root4'));
        root4.render(<Garage4 />);

    // Or if it was an object:
    // Create an object named carInfo and send it to the Car component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car5(props) {
            return <h2>Me, I am a { props.car.model }!</h2>;
        }
        function Garage5() {
            const carInfo = { name: "Ford", model: "Mustang" };
            return (
                <>
                    <h1>Who lives in my garage yet again?</h1>
                    <Car5 car={ carInfo } />
                </>
            );
        }
        const root5 = ReactDOM.createRoot(document.getElementById('root5'));
        root5.render(<Garage5 />);

    // Note: React Props are read-only! You will get an error if you try to change their value.
</script>

</body>
</html>
