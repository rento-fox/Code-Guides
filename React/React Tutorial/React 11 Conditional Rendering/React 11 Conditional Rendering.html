<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
</head>
<body>

<div id="root2"></div>
<div id="root3"></div>
<div id="root4"></div>

<script type="text/babel">
// React Conditional Rendering
    // In React, you can conditionally render components.
    // There are several ways to do this.

// if Statement
    // We can use the if JavaScript operator to decide which component to render.
    // We'll use these two components:
        function MissedGoal() {
            return <h1>MISSED!</h1>;
        }
        function MadeGoal() {
            return <h1>Goal!</h1>;
        }

    // Now, we'll create another component that chooses which component to render based on a condition:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function MissedGoal2() {
            return <h1>MISSED!</h1>;
        }
        function MadeGoal2() {
            return <h1>GOAL!</h1>;
        }
        function Goal2(props) {
            const isGoal = props.isGoal;
            if (isGoal) {
                return <MadeGoal2/>;
            }
            return <MissedGoal2/>;
        }
        const root2 = ReactDOM.createRoot(document.getElementById('root2'));
        root2.render(<Goal2 isGoal={false} />);
        // root2.render(<Goal2 isGoal={true} />);

    // Try changing the isGoal attribute to true:

// Logical && Operator
    // Another way to conditionally render a React component is by using the && operator.
    // We can embed JavaScript expressions in JSX by using curly braces:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Garage3(props) {
            const cars = props.cars;
            return (
                <>
                <h1>Garage</h1>
                {cars.length > 0 &&
                    <h2>
                    You have {cars.length} cars in your garage.
                    </h2>
                }
                </>
            );
        }
        const cars3 = ['Ford', 'BMW', 'Audi'];
        // const cars3 = [];
        const root3 = ReactDOM.createRoot(document.getElementById('root3'));
        root3.render(<Garage3 cars={cars3} />);
        
    // If cars.length > 0 is equates to true, the expression after && will render.
    // Try emptying the cars array:

// Ternary Operator
    // Another way to conditionally render elements is by using a ternary operator.
    //     condition ? true : false
    // We will go back to the goal example.
    // Return the MadeGoal component if isGoal is true, otherwise return the MissedGoal component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function MissedGoal4() {
            return <h1>MISSED!</h1>;
        }
        function MadeGoal4() {
            return <h1>GOAL!</h1>;
        }
        function Goal4(props) {
            const isGoal = props.isGoal;
            return (
                <>
                    { isGoal ? <MadeGoal4/> : <MissedGoal4/> }
                </>
            );
        }
        const root4 = ReactDOM.createRoot(document.getElementById('root4'));
        root4.render(<Goal4 isGoal={false} />);
        // root4.render(<Goal4 isGoal={true} />);

    // Try changing the isGoal attribute to true:
</script>

</body>
</html>
