<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
</head>
<body>

<div id="root"></div>
<div id="root2"></div>

<script type="text/babel">
// React Lists
    // In React, you will render lists with some type of loop.
    // The JavaScript map() array method is generally the preferred method.
    // Let's render all of the cars from our garage:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car(props) {
            return <li>I am a { props.brand }</li>;
        }
        function Garage() {
            const cars = ['Ford', 'BMW', 'Audi'];
            return (
                <>
                <h1>Who lives in my garage?</h1>
                <ul>
                    {cars.map((car) => <Car brand={car} />)}
                </ul>
                </>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Garage />);

    // When you run this code in your react-app, it will work,
    // but you will receive a warning in the console saying that there is no "key" provided for the list items.

// Keys
    // Keys allow React to keep track of elements. This way, if an item is updated or removed,
    // only that item will be re-rendered instead of the entire list.
    // Keys need to be unique to each sibling. But they can be duplicated globally.
    // Generally, the key should be a unique ID assigned to each item.
    // As a last resort, you can use the array index as a key.
    
    // Let's refactor our previous example to include keys:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        function Car2(props) {
            return <li>I am a { props.brand }</li>;
        }
        function Garage2() {
            const cars = [
                {id: 1, brand: 'Ford'},
                {id: 2, brand: 'BMW'},
                {id: 3, brand: 'Audi'}
            ];
            return (
                <>
                <h1>Who lives in my garage?</h1>
                <ul>
                    {cars.map((car) => <Car2 key={car.id} brand={car.brand} />)}
                </ul>
                </>
            );
        }
        const root2 = ReactDOM.createRoot(document.getElementById('root2'));
        root2.render(<Garage2 />);
</script>

</body>
</html>
