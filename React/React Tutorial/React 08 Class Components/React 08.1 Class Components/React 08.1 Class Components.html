<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
</head>
<body>

<div id="root2"></div>
<div id="root4"></div>
<div id="root5"></div>
<div id="root6"></div>
<div id="root7"></div>
<div id="root10"></div>
<div id="root11"></div>

<script type="text/babel">
// React Class Components
    // Before React 16.8, Class components were the only way to track state and lifecycle on a React component.
    // Function components were considered "state-less".
    // With the addition of Hooks, Function components are now almost equivalent to Class components.
    // The differences are so minor that you will probably never need to use a Class component in React.
    // Even though Function components are preferred, there are no current plans on removing Class components from React.
    // This section will give you an overview of how to use Class components in React.

// React Components
    // Components are independent and reusable bits of code.
    // They serve the same purpose as JavaScript functions, but work in isolation and return HTML via a render() function.
    // Components come in two types, Class components and Function components, in this chapter you will learn about Class components.

// Create a Class Component
    // When creating a React component, the component's name must start with an upper case letter.
    // The component has to include the extends React.Component statement,
    // this statement creates an inheritance to React.Component, and gives your component access to React.Component's functions.
    // The component also requires a render() method, this method returns HTML.
    // Create a Class component called Car
        class Car extends React.Component {
            render() {
                return <h2>Hi, I am a Car!</h2>;
            }
        }

    // Now your React application has a component called Car, which returns a <h2> element.
    // To use this component in your application, use similar syntax as normal HTML: <Car />
    // Display the Car component in the "root" element:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car2 extends React.Component {
            render() {
                return <h2>Hi, I am a Car!</h2>;
            }
        }
        const container2 = document.getElementById('root2');
        const root2 = ReactDOM.createRoot(container2);
        root2.render(<Car2 />);

// Component Constructor
    // If there is a constructor() function in your component,
    // this function will be called when the component gets initiated.
    // The constructor function is where you initiate the component's properties.
    // In React, component properties should be kept in an object called state.
    // You will learn more about state later in this tutorial.

    // The constructor function is also where you honor the inheritance of the parent component by including the super() statement,
    // which executes the parent component's constructor function,
    // and your component has access to all the functions of the parent component (React.Component).
    // Create a constructor function in the Car component, and add a color property:
        class Car3 extends React.Component {
            constructor() {
                super();
                this.state = {color: "red"};
            }
            render() {
                return <h2>I am a Car!</h2>;
            }
        }

    // Use the color property in the render() function:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car4 extends React.Component {
            constructor() {
                super();
                this.state = {color: "red"};
            }
            render() {
                return <h2>I am a {this.state.color} Car!</h2>;
            }
        }
        const root4 = ReactDOM.createRoot(document.getElementById('root4'));
        root4.render(<Car4 />);

// Props
    // Another way of handling component properties is by using props.
    // Props are like function arguments, and you send them into the component as attributes.
    // You will learn more about props in the next chapter.
    // Use an attribute to pass a color to the Car component, and use it in the render() function:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car5 extends React.Component {
            render() {
                return <h2>I am a {this.props.color} Car too!</h2>;
            }
        }
        const container5 = document.getElementById('root5');
        const root5 = ReactDOM.createRoot(container5);
        root5.render(<Car5 color="red"/>);

// Props in the Constructor
    // If your component has a constructor function,
    // the props should always be passed to the constructor and also to the React.Component via the super() method.
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car6 extends React.Component {
            constructor(props) {
                super(props);
            }
            render() {
                return <h2>I am a {this.props.model}!</h2>;
            }
        }
        const root6 = ReactDOM.createRoot(document.getElementById('root6'));
        root6.render(<Car6 model="Mustang"/>);

// Components in Components
    // We can refer to components inside other components:
    // Use the Car component inside the Garage component:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car7 extends React.Component {
            render() {
                return <h2>I am a Car!</h2>;
            }
        }
        class Garage7 extends React.Component {
            render() {
                return (
                <div>
                    <h1>Who lives in my Garage?</h1>
                    <Car7 />
                </div>
                );
            }
        }
        const root7 = ReactDOM.createRoot(document.getElementById('root7'));
        root7.render(<Garage7 />);

// Components in Files
    // React is all about re-using code, and it can be smart to insert some of your components in separate files.
    // To do that, create a new file with a .js file extension and put the code inside it:
    // Note that the file must start by importing React (as before), and it has to end with the statement export default Car;.
    // This is the new file, we named it Car.js:
        // import React from 'react';
        // class Car extends React.Component {
        //     render() {
        //         return <h2>Hi, I am a Car!</h2>;
        //     }
        // }
        // export default Car;

    // Now we import the Car.js file in the application, and we can use the Car component as if it was created here.
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        // import Car from './Car.js';
        // const container = document.getElementById('root');
        // const root = ReactDOM.createRoot(container);
        // root.render(<Car />);

// React Class Component State
    // React Class components have a built-in state object.
    // You might have noticed that we used state earlier in the component constructor section.
    // The state object is where you store property values that belongs to the component.
    // When the state object changes, the component re-renders.

// Creating the state Object
    // The state object is initialized in the constructor:
    // Specify the state object in the constructor method:
        class Car8 extends React.Component {
            constructor(props) {
                super(props);
                this.state = {brand: "Ford"};
            }
            render() {
                return (
                    <div>
                        <h1>My Car</h1>
                    </div>
                );
            }
        }

    // The state object can contain as many properties as you like:
    // Specify all the properties your component need:
        class Car9 extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    brand: "Ford",
                    model: "Mustang",
                    color: "red",
                    year: 1964
                };
            }
            render() {
                return (
                    <div>
                        <h1>My Car</h1>
                    </div>
                );
            }
        }

// Using the state Object
    // Refer to the state object anywhere in the component by using the this.state.propertyname syntax:
    // Refer to the state object in the render() method:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car10 extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    brand: "Ford",
                    model: "Mustang",
                    color: "red",
                    year: 1964
                };
            }
            render() {
                return (
                    <div>
                        <h1>My {this.state.brand}</h1>
                        <p>
                            It is a {this.state.color} {this.state.model} from {this.state.year}.
                        </p>
                    </div>
                );
            }
        }
        const container10 = document.getElementById('root10');
        const root10 = ReactDOM.createRoot(container10);
        root10.render(<Car10 />);

// Changing the state Object
    // To change a value in the state object, use the this.setState() method.
    // When a value in the state object changes, the component will re-render,
    // meaning that the output will change according to the new value(s).
    // Add a button with an onClick event that will change the color property:
        // import React from 'react';
        // import ReactDOM from 'react-dom/client';
        class Car11 extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    brand: "Ford",
                    model: "Mustang",
                    color: "red",
                    year: 1964
                };
            }
            changeColor = () => {
                (this.state.color === "red") ?
                    this.setState({color: "blue"})
                    :
                    this.setState({color: "red"})
            }
            render() {
                return (
                    <div>
                        <h1>My {this.state.brand}</h1>
                        <p>
                            It is a {this.state.color} {this.state.model} from {this.state.year}.
                        </p>
                        <button
                            type="button"
                            onClick={this.changeColor}
                        >Change color</button>
                    </div>
                );
            }
        }
        const root11 = ReactDOM.createRoot(document.getElementById('root11'));
        root11.render(<Car11 />);

    // Always use the setState() method to change the state object,
    // it will ensure that the component knows its been updated and calls the render() method (and all the other lifecycle methods).
</script>

</body>
</html>
