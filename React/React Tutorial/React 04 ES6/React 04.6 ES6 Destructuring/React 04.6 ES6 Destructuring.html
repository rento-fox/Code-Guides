<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
</head>
<body>

<script type="text/babel">
// React ES6 Destructuring
    // To illustrate destructuring, we'll make a sandwich.
    // Do you take everything out of the refrigerator to make your sandwich?
    // No, you only take out the items you would like to use on your sandwich.
    // Destructuring is exactly the same. We may have an array or object that we are working with,
    // but we only need some of the items contained in these.
    // Destructuring makes it easy to extract only what is needed.

// Destructing Arrays
    // Here is the old way of assigning array items to a variable:
    // Before:
        const vehicles = ['mustang', 'f-150', 'expedition'];
        // old way
        const car = vehicles[0];
        const truck = vehicles[1];
        const suv = vehicles[2];

    // Here is the new way of assigning array items to a variable:
        // With destructuring:
        const vehicles2 = ['mustang', 'f-150', 'expedition'];
        const [car2, truck2, suv2] = vehicles2;

    // When destructuring arrays, the order that variables are declared is important.
    // If we only want the car and suv we can simply leave out the truck but keep the comma:
        const vehicles3 = ['mustang', 'f-150', 'expedition'];
        const [car3, , suv3] = vehicles3;

    // Destructuring comes in handy when a function returns an array:
        function calculate(a, b) {
            const add = a + b;
            const subtract = a - b;
            const multiply = a * b;
            const divide = a / b;

            return [add, subtract, multiply, divide];
        }
        const [add, subtract, multiply, divide] = calculate(4, 7);
        document.write("<p>Numbers: 4, 7" + "</p>");
        document.write("<p>Sum: " + add + "</p>");
        document.write("<p>Difference " + subtract + "</p>");
        document.write("<p>Product: " + multiply + "</p>");
        document.write("<p>Quotient " + divide + "</p>");

// Destructuring Objects
    // Here is the old way of using an object inside a function:
        // Before:
        const vehicleOne = {
            brand: 'Ford',
            model: 'Mustang',
            type: 'car',
            year: 2021, 
            color: 'red'
        }
        myVehicle1(vehicleOne);
        // old way
        function myVehicle1(vehicle) {
            const message = 'My ' + vehicle.type + ' is a ' + vehicle.color + ' ' + vehicle.brand + ' ' + vehicle.model + '.';
            document.write(message)
        }
        document.write("<br>"); // newline

    // Here is the new way of using an object inside a function:
        // With destructuring:
        const vehicleTwo = {
            brand: 'Ford',
            model: 'Mustang',
            type: 'car',
            year: 2021, 
            color: 'red'
        }
        myVehicle2(vehicleTwo);
        function myVehicle2({type, color, brand, model}) {
            const message = 'My ' + type + ' is a ' + color + ' ' + brand + ' ' + model + '.';
            document.write(message)
        }
        document.write("<br>"); // newline

    // Notice that the object properties do not have to be declared in a specific order.

    // We can even destructure deeply nested objects by referencing the nested object,
    // then using a colon and curly braces to again destructure the items needed from the nested object:
        const vehicleThree = {
            brand: 'Ford',
            model: 'Mustang',
            type: 'car',
            year: 2021, 
            color: 'red',
            registration: {
                city: 'Houston',
                state: 'Texas',
                country: 'USA'
            }
        }
        myVehicle3(vehicleThree)
        function myVehicle3({ model, registration: { state } }) {
            const message = 'My ' + model + ' is registered in ' + state + '.';
            document.write(message)
        }
</script>

</body>
</html>
